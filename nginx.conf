# /etc/nginx/sites-available/autoscore
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/autoscore
#   sudo ln -s /etc/nginx/sites-available/autoscore /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name calvaryagkc.app www.calvaryagkc.app;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name calvaryagkc.app www.calvaryagkc.app;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/calvaryagkc.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/calvaryagkc.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Deny framing entirely — this app is never embedded
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Disable browser features this app never uses
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # Content Security Policy
    #   script-src 'self'          — Vite bundles everything; no inline or CDN scripts
    #   style-src  'unsafe-inline' — Radix UI sets inline styles; Google Fonts stylesheet
    #   font-src                   — Google Fonts files
    #   img-src                    — Unsplash hero image on home page
    #   connect-src 'self'         — API REST + SSE stream are same-origin
    #   frame-ancestors 'none'     — belt-and-suspenders alongside X-Frame-Options
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE requires no buffering and a long timeout
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
